<!DOCTYPE html>
<html lang="en">

<head>

  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monica Gabriel - Design</title>
  <meta name="description" content="Monica's Portfolio, a creative and frontend developer based in Portugal">
  <meta name="author" content="Monica Gabriel">
  <meta name="keywords" content="photographer,videographer,designer,developer,creative">

  <meta property="og:title" content="Monica Gabriel" />

  <link rel="apple-touch-icon" sizes="144x144" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico" />

  <!-- Ligthbox -->
  <link rel="stylesheet" href="css/simpleLightbox.min.css">
  <!-- Animate on Scroll -->
  <link rel="stylesheet" href="css/aos.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">
  <noscript>
    <style>[data-aos^=fade][data-aos^=fade] {opacity: 1} [data-aos=fade-up]{transform:translateY(0)}</style>
  </noscript>

</head>

<body>

  <!-- NAVBAR -->
  <nav id="navbar" data-aos="fade" data-aos-delay="800">
    <div class="container">
      <div class="logo">
        <a href="/">Monica</a>
      </div>

      <div class="nav-toggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>

      <div class="nav-links">
        <a href="/#about">about</a>
        <a href="/#frontend">front end</a>
        <a href="/#creative">creative</a>
        <a href="#" id="contact-toggle">contact</a>
      </div>
    </div>
  </nav>

  <!-- CONTACT -->
  <div id="contact">
    <div class="container">

      <p class="color">hello</p>
      <h3 class="line">let's chat</h3>

      <form action="index.html#mailsuccess" method="post" spellcheck="false" autocapitalize="off" netlify-honeypot="bot-field"
        netlify>
        <span class="close"></span>

        <input type="text" name="name" placeholder="name" autocomplete="off" required>
        <input type="email" name="email" placeholder="email" autocomplete="email" required>
        <textarea name="message" placeholder="message" required></textarea>
        <input type="submit" name="submit" value="send">
        <!-- honeypot -->
        <input type="text" name="bot-field" class="hidden">
      </form>

      <div class="spacer"></div>

      <div class="social-links">
        <a href='https://github.com/msgabriel' target='_blank'>
          <span class='icon github'></span>
        </a>
        <a href='https://codepen.io/msgabriel/' target='_blank'>
          <span class='icon codepen'></span>
        </a>
        <a href='https://industriacriativa.pt/msgabriel' target='_blank'>
          <span class='icon industria'></span>
        </a>
        <a href='https://www.artstation.com/msgabriel' target='_blank'>
          <span class='icon artstation'></span>
        </a>
      </div>

    </div>
  </div>

  <div id="contact-msg">
    <div class="container">
      <span class="close"></span>
      <h3 class="line">Thank you!</h3>
      <p>Your message was sent</p>
    </div>
  </div>

  <!-- HEADER -->
  <section id="header">
    <div data-aos="fade" data-aos-delay="400">
      <h2 class="project-header line">Design</h2>
      <p class="hero-tag">graphic &amp; web</p>
    </div>
  </section>

  <!-- CONTENT -->
  <section id="portfolio" data-aos="fade-up">
    <div class="container is-grid gallery">
      <div>
        <a href="https://dl.dropboxusercontent.com/s/tz3edxdf2hs4ipt/2_design.jpg">
          <img src="https://dl.dropboxusercontent.com/s/0gx3ou7euvm6awh/2_design_small.jpg" alt="flyers Semana Juventude Rio Maior" />
        </a>
      </div>
      <div>
        <a href="https://dl.dropboxusercontent.com/s/ubf3bu1qwmx0rhp/3_design.jpg">
          <img src="https://dl.dropboxusercontent.com/s/ru0sfmhxplvhk2m/3_design_small.jpg" alt="" />
        </a>
      </div>
      <div>
        <a href="https://dl.dropboxusercontent.com/s/s0ly5o90onedgbf/4_design.jpg">
          <img src="https://dl.dropboxusercontent.com/s/hla8ngt7qutk12p/4_design_small.jpg" alt="" />
        </a>
      </div>
      <div>
        <a href="https://dl.dropboxusercontent.com/s/425da7v9bak8ei6/5_design.jpg">
          <img src="https://dl.dropboxusercontent.com/s/q3ept53lptuzkor/5_design_small.jpg" alt="" />
        </a>
      </div>
      <div>
        <a href="https://dl.dropboxusercontent.com/s/gn27gmyehfh2sks/1_design.jpg">
          <img src="https://dl.dropboxusercontent.com/s/at6roiy1zartjca/1_design_small.jpg" alt="The Mystery of Nils book cover" />
        </a>
      </div>
      <div>
        <a href="https://dl.dropboxusercontent.com/s/jwcf8cfvmpn6mde/6_design.jpg">
          <img src="https://dl.dropboxusercontent.com/s/4pyk3pb9zyu840k/6_design_small.jpg" alt="" />
        </a>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="social-links">
        <a href='https://github.com/msgabriel' title="github" target='_blank' rel="noreferrer">
          <span class='icon github'></span>
        </a>
        <a href='https://codepen.io/msgabriel/' title="codepen" target='_blank' rel="noreferrer">
          <span class='icon codepen'></span>
        </a>
        <a href='https://industriacriativa.pt/msgabriel' title="industria criativa" target='_blank' rel="noreferrer">
          <span class='icon industria'></span>
        </a>
        <a href='https://www.artstation.com/msgabriel' title="artstation" target='_blank' rel="noreferrer">
          <span class='icon artstation'></span>
        </a>
      </div>
      <div class="copy">
        <p>Mónica Gabriel &copy; 2014 -
          <script type="text/javascript">var creditsyear = new Date(); document.write(creditsyear.getFullYear());</script>
        </p>
      </div>
    </div>
  </footer>

  <script src="/libs/aos.js"></script>
  <script src="/libs/simpleLightbox.min.js"></script>
  <script src="/libs/autosize.min.js"></script>
  <script>
    // animate on scroll
    AOS.init({
      duration: 1000,
      easing: 'ease-in-out',
      delay: 400,
    });
    // lightbox
    new SimpleLightbox({ elements: '.gallery a' });
    // autoresize textarea
    autosize(document.querySelector('textarea'));
  </script>
  <script src="js/main.js"></script>
