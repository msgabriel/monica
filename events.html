<body>

  <!-- NAVBAR -->
  <nav id="navbar" data-aos="fade" data-aos-delay="800">
    <div class="container">
      <div class="logo">
        <a href="/">Monica</a>
      </div>

      <div class="nav-toggle">
        <span class="bar" aria-hidden="true"></span>
        <span class="bar" aria-hidden="true"></span>
        <span class="bar" aria-hidden="true"></span>
        <span class="sr-only">menu</span>
      </div>

      <div class="nav-links">
        <a href="/#about">about</a>
        <a href="/#frontend">front end</a>
        <a href="/#creative">creative</a>
        <a href="#" id="contact-toggle">contact</a>
      </div>
    </div>
  </nav>

  <!-- CONTACT -->
  <div id="contact">
    <div class="container">

      <p class="color">hello</p>
      <h3 class="line">let's chat</h3>

      <form action="/#mailsuccess" method="post" name="contact" spellcheck="false" autocapitalize="off" netlify-honeypot="bot-field" netlify>
        <span class="close"></span>

        <input type="text" name="name" placeholder="name" autocomplete="off" required>
        <input type="email" name="email" placeholder="email" autocomplete="email" required>
        <textarea name="message" placeholder="message" required></textarea>
        <input type="submit" name="submit" value="send">
        <!-- honeypot -->
        <input type="text" name="bot-field" class="hidden">
      </form>

      <div class="spacer"></div>

      <div class="social-links">
        <a href='https://github.com/msgabriel' target='_blank' rel="noreferrer">
          <span class='icon github'></span>
          <span class="sr-only">github</span>
        </a>
        <a href='https://codepen.io/msgabriel/' target='_blank' rel="noreferrer">
          <span class='icon codepen'></span>
          <span class="sr-only">codepen</span>
        </a>
        <a href='https://dribbble.com/msgabriel' target='_blank' rel="noreferrer">
          <span class='icon dribbble'></span>
          <span class="sr-only">dribbble</span>
        </a>
        <a href='https://www.artstation.com/msgabriel' target='_blank' rel="noreferrer">
          <span class='icon artstation'></span>
          <span class="sr-only">artstation</span>
        </a>
      </div>

    </div>
  </div>

  <div id="contact-msg">
    <div class="container">
      <span class="close"></span>
      <h3 class="line">Thank you!</h3>
      <p>Your message was sent</p>
    </div>
  </div>

  <!-- HEADER -->
  <section id="header">
    <div data-aos="fade" data-aos-delay="400">
      <h2 class="project-header line">Events</h2>
      <p class="hero-tag">theatre &amp; performance photography</p>
    </div>
  </section>
